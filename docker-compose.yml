# ─────────────────────────────────────────────────────────────
# Qing Li Mall - Docker Compose 部署配置  v2.0
# 服务: nginx (80) | backend (8081) | mysql (3306) | minio (9000/9001)
# ─────────────────────────────────────────────────────────────

services:

  # ── MinIO 对象存储 ────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: qingli-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-Admin123456!}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web 控制台
    networks:
      - qingli-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── MySQL 数据库 ──────────────────────────────────────────
  mysql:
    image: mysql:5.7
    container_name: qingli-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-668668}
      MYSQL_DATABASE: dianshang
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    ports:
      - "127.0.0.1:3306:3306"   # 只绑定本地，不暴露公网
    networks:
      - qingli-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-668668}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Spring Boot 后端 ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: qingli-backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # MySQL
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dianshang?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-668668}
      # MinIO（同网络内直接用容器名访问）
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-Admin123456!}
      MINIO_BUCKET_NAME: images
      # 跨域（只允许正式域名，防止 CSRF）
      APP_CORS_ALLOWED_ORIGINS: "https://zlzpeptidepolypeptide.com,https://www.zlzpeptidepolypeptide.com"
      APP_JWT_SECRET: ${JWT_SECRET:-qingli-jwt-secret-key-2026-must-be-at-least-256-bits-long}
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - qingli-net

  # ── Nginx 前端 + 反代 + HTTPS ───────────────────────────
  nginx:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: qingli-nginx
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - qingli-net

# ─────────────────────────────────────────────────────────────
networks:
  qingli-net:
    driver: bridge

volumes:
  mysql_data:
  minio_data:

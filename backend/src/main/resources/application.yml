server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dianshang?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 668668
    driver-class-name: com.mysql.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.qingli.mall.entity
  configuration:
    map-underscore-to-camel-case: true

# MinIO 对象存储
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  accessKey: ${MINIO_ACCESS_KEY:admin}
  secretKey: ${MINIO_SECRET_KEY:Admin123456!}
  bucketName: ${MINIO_BUCKET_NAME:images}

app:
  # 跨域允许前端地址
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:3002
  # 联系表单收件配置（优先从数据库 site_config.contact_email 读取，未配置时降级到此处）
  mail:
    recipient: info@qinglipeptide.com   # 兜底收件地址（数据库无 contact_email 时使用）
    from-name: Qing Li Peptide Website  # 发件人显示名
  # JWT 签名密钥（生产环境请改成256位以上随机字符串）
  jwt:
    secret: qingli-jwt-secret-key-2026-must-be-at-least-256-bits-long
    expiration: 86400000   # 24小时（毫秒）

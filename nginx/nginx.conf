user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # 文件上传大小限制
    client_max_body_size 50m;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ── HTTP → HTTPS 强制跳转 ───────────────────────────────
    server {
        listen       80;
        server_name  zlzpeptidepolypeptide.com www.zlzpeptidepolypeptide.com;
        return 301   https://$host$request_uri;
    }

    # ── HTTPS 主站 ──────────────────────────────────────────
    server {
        listen       443 ssl http2;
        server_name  zlzpeptidepolypeptide.com www.zlzpeptidepolypeptide.com;

        ssl_certificate      /etc/letsencrypt/live/zlzpeptidepolypeptide.com/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/zlzpeptidepolypeptide.com/privkey.pem;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        root   /usr/share/nginx/html;
        index  index.html;

        # ── 前端 SPA（React Router history 模式）────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── 后端 API 反代 ────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend:8081;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout  60s;
            proxy_read_timeout     120s;
        }

        # ── MinIO 静态资源反代 ───────────────────────────────────
        location ^~ /minio-static/ {
            proxy_pass         http://qingli-minio:9000/;
            proxy_set_header   Host              qingli-minio:9000;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_buffering    off;
        }

        # ── 安全响应头 ───────────────────────────────────────────
        add_header X-Content-Type-Options   "nosniff"           always;
        add_header X-Frame-Options          "SAMEORIGIN"        always;
        add_header X-XSS-Protection         "1; mode=block"     always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

        # ── index.html 永不缓存（确保 SPA 始终加载最新入口）──────
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # ── 静态资源长缓存（Vite hash 文件名保证唯一性）──────────
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
